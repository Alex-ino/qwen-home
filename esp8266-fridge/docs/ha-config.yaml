## Автоматизации

### Уведомление о повышенной температуре в холодильнике

```yaml
alias: "🧊 Холодильник - Высокая температура"
description: "Уведомление если температура в холодильнике выше нормы"
trigger:
  - platform: numeric_state
    entity_id: sensor.fridge_temperature
    above: 7
    for:
      minutes: 10
condition: []
action:
  - service: notify.mobile_app_your_phone
    data:
      title: "⚠️ Холодильник"
      message: "Температура в холодильнике повысилась до {{ states('sensor.fridge_temperature') }}°C"
      data:
        push:
          sound: default
          category: alert
mode: single
```

### Уведомление о разморозке морозилки

```yaml
alias: "🧊 Морозилка - Критическая температура"
description: "Уведомление если морозилка начала размораживаться"
trigger:
  - platform: numeric_state
    entity_id: sensor.freezer_temperature
    above: -12
    for:
      minutes: 15
condition: []
action:
  - service: notify.mobile_app_your_phone
    data:
      title: "🚨 Морозилка"
      message: "Критическая температура в морозилке: {{ states('sensor.freezer_temperature') }}°C! Возможна порча продуктов!"
      data:
        push:
          sound: emergency
          category: alarm
mode: single
```

### Уведомление о потере связи с устройством

```yaml
alias: "📡 Холодильник - Потеря связи"
description: "Уведомление если устройство офлайн"
trigger:
  - platform: state
    entity_id: binary_sensor.fridge_availability
    to: "off"
    for:
      minutes: 5
condition: []
action:
  - service: notify.mobile_app_your_phone
    data:
      title: "📡 Холодильник"
      message: "Потеряна связь с контроллером холодильника"
mode: single
```

