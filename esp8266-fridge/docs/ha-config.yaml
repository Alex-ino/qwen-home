# Конфигурация Home Assistant для умного холодильника

Этот файл содержит пример конфигурации для `configuration.yaml` если автоматическое обнаружение не работает или вы хотите добавить дополнительные entities вручную.

## Базовая конфигурация MQTT

```yaml
mqtt:
  broker: 192.168.1.XXX  # IP вашего MQTT брокера
  port: 1883
  username: ""           # Оставьте пустым если нет аутентификации
  password: ""           # Оставьте пустым если нет аутентификации
  
  # Last Will & Testament будет отправляться автоматически устройством
  
  sensor:
    - name: "Fridge Temperature"
      unique_id: fridge_temp_main
      state_topic: "home/fridge/main/temp"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      availability_topic: "home/fridge/avail"
      payload_available: "online"
      payload_not_available: "offline"
      device:
        identifiers: ["fridge_esp8266"]
        name: "Холодильник"
        manufacturer: "DIY"
        model: "ESP8266+DS18B20"
        sw_version: "1.0"
        connections:
          - ["mac", "XX:XX:XX:XX:XX:XX"]  # Замените на MAC адрес ESP
    
    - name: "Freezer Temperature"
      unique_id: fridge_temp_freezer
      state_topic: "home/fridge/freezer/temp"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      availability_topic: "home/fridge/avail"
      payload_available: "online"
      payload_not_available: "offline"
      device:
        identifiers: ["fridge_esp8266"]
        name: "Холодильник"

  number:
    - name: "Fridge Target Temp"
      unique_id: fridge_target_main
      command_topic: "home/fridge/main/target/set"
      state_topic: "home/fridge/main/target"
      min: -10
      max: 10
      step: 0.5
      unit_of_measurement: "°C"
      mode: box
      availability_topic: "home/fridge/avail"
      device:
        identifiers: ["fridge_esp8266"]
    
    - name: "Freezer Target Temp"
      unique_id: fridge_target_freezer
      command_topic: "home/fridge/freezer/target/set"
      state_topic: "home/fridge/freezer/target"
      min: -30
      max: -10
      step: 0.5
      unit_of_measurement: "°C"
      mode: box
      availability_topic: "home/fridge/avail"
      device:
        identifiers: ["fridge_esp8266"]

  switch:
    - name: "Fridge Compressor"
      unique_id: fridge_compressor
      command_topic: "home/fridge/compressor/set"
      state_topic: "home/fridge/compressor/state"
      availability_topic: "home/fridge/avail"
      payload_on: "ON"
      payload_off: "OFF"
      device:
        identifiers: ["fridge_esp8266"]
```

