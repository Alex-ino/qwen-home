## Советы по оптимизации

1. **Настройте retention для MQTT топиков** чтобы HA получал последние значения после перезагрузки
2. **Используйте QoS 1** для критических сообщений (статус компрессора)
3. **Включите логирование MQTT** для отладки:
   ```yaml
   logger:
     default: warning
     logs:
       homeassistant.components.mqtt: debug
   ```
4. **Настройте резервное копирование** конфигурации HA регулярно
