## Energy Dashboard (опционально)

Если у вас есть датчик энергопотребления холодильника, можно добавить:

```yaml
sensor:
  - platform: mqtt
    name: "Fridge Power"
    unique_id: fridge_power
    state_topic: "home/fridge/power"
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    device:
      identifiers: ["fridge_esp8266"]
  
  - platform: mqtt
    name: "Fridge Energy"
    unique_id: fridge_energy
    state_topic: "home/fridge/energy"
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    device:
      identifiers: ["fridge_esp8266"]
```

Затем добавьте эти сенсоры в Energy Dashboard в настройках HA.

