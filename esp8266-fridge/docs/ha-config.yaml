## Binary Sensor для доступности устройства

Для мониторинга онлайн/оффлайн статуса:

```yaml
binary_sensor:
  - platform: mqtt
    name: "Fridge Availability"
    unique_id: fridge_availability
    state_topic: "home/fridge/avail"
    payload_on: "online"
    payload_off: "offline"
    device_class: connectivity
    device:
      identifiers: ["fridge_esp8266"]
```

---

## Template Sensor для расчёта разницы температур

```yaml
template:
  - sensor:
      - name: "Fridge Temp Difference"
        unique_id: fridge_temp_diff
        unit_of_measurement: "°C"
        device_class: temperature
        state: >
          {% set main = states('sensor.fridge_temperature') | float(default=0) %}
          {% set freezer = states('sensor.freezer_temperature') | float(default=0) %}
          {{ (main - freezer) | round(1) }}
        availability:
          - entity_id: sensor.fridge_temperature
          - entity_id: sensor.freezer_temperature
```

