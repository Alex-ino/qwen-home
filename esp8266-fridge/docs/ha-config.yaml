## Lovelace Dashboard Card

Добавьте в ваш Dashboard через UI Editor или YAML:

```yaml
type: vertical-stack
title: 🧊 Холодильник
cards:
  - type: entities
    entities:
      - entity: sensor.fridge_temperature
        name: Холодильная камера
        icon: mdi:fridge
      - entity: sensor.freezer_temperature
        name: Морозильная камера
        icon: mdi:snowflake
      - type: divider
      - entity: number.fridge_target_temp
        name: Целевая темп. (холод.)
      - entity: number.freezer_target_temp
        name: Целевая темп. (мороз.)
      - type: divider
      - entity: switch.fridge_compressor
        name: Компрессор
        icon: mdi:engine
  
  - type: history-graph
    title: История температур (24ч)
    entities:
      - entity: sensor.fridge_temperature
      - entity: sensor.freezer_temperature
    hours_to_show: 24
    refresh_interval: 30
  
  - type: statistics-graph
    title: Статистика (7 дней)
    days_to_show: 7
    entities:
      - entity: sensor.fridge_temperature
      - entity: sensor.freezer_temperature
    chart_type: line
    stat_types:
      - mean
      - min
      - max
```

